---
name: Pull Request checks

"on":
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  shell_check:
    name: "Shell: Syntax checks"
    uses: scaleway-terraform-modules/workflows/.github/workflows/shell_check.yaml@2510c7c05af9229bf86d42c8593c3f64a72886d1  # v2.1.16
  go_check:
    name: "Go: Syntax checks"
    runs-on: ubuntu-latest
    steps:
      - id: repo_checkout
        name: "Repository: Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - id: "go_setup"
        name: "Go: Setup"
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: 'functions/purge/go.mod'
          cache-dependency-path: |
              functions/purge/go.sum
      - id: "go_fmt"
        name: "Go: Check formatting"
        run: go fmt
        working-directory: functions/purge
      - id: "go_build"
        name: "Go: Build the package"
        run: go build
        working-directory: functions/purge
  tf_module_check:
    name: "Terraform Module: Code checks"
    uses: scaleway-terraform-modules/workflows/.github/workflows/tf_module_check.yaml@2510c7c05af9229bf86d42c8593c3f64a72886d1  # v2.1.16
  yaml_check:
    name: "YAML: Syntax checks"
    uses: scaleway-terraform-modules/workflows/.github/workflows/yaml_check.yaml@2510c7c05af9229bf86d42c8593c3f64a72886d1  # v2.1.16
